<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rude Sounds Radio</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');

    :root {
      --chrome-white: #f0f0f0;
      --oxblood-wall: #4a0000;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Impact', sans-serif;
      background-image: url("https://www.transparenttextures.com/patterns/old-wall.png");
      background-color: var(--oxblood-wall);
      color: white;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .hero-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 70px;
      margin-top: 80px;
      width: 100%;
    }

    .slider-container {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .main-logo {
      max-width: 500px;
      width: 90%;
      min-height: 350px;
      object-fit: contain;
      border: 12px solid #fff;
      box-shadow: 12px 12px 0px rgba(0,0,0,0.6);
      transition: all 0.4s ease;
    }

    .main-logo:hover {
      transform: scale(1.03);
    }

    .arrow {
      background: #000;
      color: #fff;
      border: 4px solid #fff;
      font-size: 2rem;
      cursor: pointer;
      padding: 10px 18px;
      transition: 0.3s;
    }

    .arrow:hover {
      background: #fff;
      color: #000;
    }

    .player-container {
      width: 550px;
      max-width: 90%;
      background: #000;
      border-radius: 2px;
      border: 4px solid var(--chrome-white);
      height: 300px;
      overflow: hidden;
    }

    .player-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      filter: invert(1) grayscale(1) contrast(1.2) brightness(1.3);
    }

    .description {
      max-width: 700px;
      margin: 120px auto 60px;
      padding: 40px;
      background: rgba(0, 0, 0, 0.9);
      border-top: 3px solid var(--chrome-white);
      font-family: 'Courier Prime', monospace;
      font-size: 1.1em;
      line-height: 1.6;
      text-align: left;
    }

    .chat-wrapper {
      width: 700px;
      max-width: 90%;
      margin-bottom: 100px;
      background: #000;
      border: 2px solid var(--chrome-white);
      height: 380px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    }

    .social-links {
      margin-bottom: 120px;
      display: flex;
      gap: 70px;
      justify-content: center;
    }

    .social-link img {
      width: 50px;
      filter: grayscale(100%) brightness(0.8);
      transition: 0.3s ease;
    }

    .social-link img:hover {
      filter: grayscale(0%) brightness(1);
      transform: scale(1.1);
    }

    footer {
      padding: 60px;
      background: #000;
      width: 100%;
      color: #333;
      font-size: 0.8em;
      letter-spacing: 4px;
    }

    @media (min-width: 1100px) {
      .hero-section {
        flex-direction: row;
        justify-content: center;
        gap: 140px;
      }
    }

    @media (max-width: 768px) {
      .slider-container {
        flex-direction: column;
      }

      .main-logo {
        max-width: 90%;
        min-height: auto;
      }
    }
  </style>
</head>

<body>

  <div class="hero-section">

    <div class="slider-container">

      <button class="arrow" onclick="changeImage(-1)">
        ❮
      </button>

      <img
        id="logoSlider"
        src="https://i.imgur.com/RvngBZz.jpg"
        alt="Rude Sounds Radio"
        class="main-logo">

      <button class="arrow" onclick="changeImage(1)">
        ❯
      </button>

    </div>

    <div class="player-container">
      <iframe
        src="https://rudesounds.ismyradio.com/player"
        allow="autoplay"
        scrolling="no">
      </iframe>
    </div>

  </div>

  <div class="description">
    <p>
      <strong>Rude Sounds:</strong>
      Ο ήχος που μιλάει με τη γλώσσα του δρόμου.
      Με την παρέα από το <strong>Clockwork Skins Crew</strong>,
      φέρνουμε κοντά τον αυθεντικό ήχο του Oi!,
      της skinhead κουλτούρας και της reggae μουσικής.
    </p>
  </div>

  <div class="chat-wrapper">
    <iframe
      src="https://www5.cbox.ws/box/?boxid=961981&boxtag=RmXNNb"
      width="100%"
      height="100%"
      frameborder="0">
    </iframe>
  </div>

  <div class="social-links">

    <a href="https://www.facebook.com/groups/608013455649231/"
       target="_blank"
       class="social-link">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png"
           alt="Facebook">
    </a>

    <a href="https://www.instagram.com/clockwork_skins_crew"
       target="_blank"
       class="social-link">
      <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png"
           alt="Instagram">
    </a>

  </div>

  <footer>
    RUDE SOUNDS © 2025 | CLOCKWORK SKINS CREW
  </footer>

  <script>
    const images = [
      "https://i.imgur.com/RvngBZz.jpg",
      "https://i.imgur.com/MPLkicA.jpg"
    ];

    let currentImage = 0;

    function changeImage(direction) {
      currentImage += direction;

      if (currentImage >= images.length) {
        currentImage = 0;
      }

      if (currentImage < 0) {
        currentImage = images.length - 1;
      }

      document.getElementById("logoSlider").src = images[currentImage];
    }
  </script>

</body>
</html>
